<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    @keyframes float1 {
      0%, 100% { transform: rotate(-15deg) translateY(0px); }
      50%       { transform: rotate(-15deg) translateY(-12px); }
    }
    @keyframes float2 {
      0%, 100% { transform: rotate(12deg) translateY(0px); }
      50%       { transform: rotate(12deg) translateY(-16px); }
    }
    @keyframes float3 {
      0%, 100% { transform: rotate(8deg) translateY(0px); }
      50%       { transform: rotate(8deg) translateY(-10px); }
    }
    @keyframes float4 {
      0%, 100% { transform: rotate(-10deg) translateY(0px); }
      50%       { transform: rotate(-10deg) translateY(-14px); }
    }
    .nav-clip {
      width: 36px; height: 36px;
      background: var(--green-mid);
      border: 2px solid var(--green-dark);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: var(--shadow-sm);
    }
    .nav-clip::before {
      content: '';
      position: absolute;
      top: -6px;
      width: 16px; height: 7px;
      background: var(--green-dark);
      border-radius: 6px;
    }
    .nav-clip span {
      font-size: 16px;
      position: relative;
      top: 1px;
    }
    #mainContent { position: relative; z-index: 1; }
    .section-divider {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: var(--paper-line);
      border-radius: 2px;
    }
  </style>
</head>
<body style="font-family:'Plus Jakarta Sans',sans-serif;" class="min-h-screen">

  <!-- Background floating notes -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index:0">
    <div style="position:absolute;left:-30px;top:120px;opacity:0.25;animation:float1 3.5s ease-in-out infinite">
      <div style="width:90px;height:105px;background:#5a7a4a;border:3px solid #4a6a3a;border-radius:14px;display:flex;flex-direction:column;align-items:center;padding-top:8px;box-shadow:0 8px 20px rgba(0,0,0,0.15)">
        <div style="width:32px;height:12px;background:#4a6a3a;border-radius:10px;margin-top:-12px"></div>
        <div style="flex:1;width:calc(100% - 10px);margin:5px 0;background:#f5f0e0;border-radius:8px;padding:6px;position:relative;overflow:hidden">
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;border-radius:2px"></div>
          <div style="position:absolute;bottom:0;right:0;width:12px;height:12px;background:linear-gradient(135deg,transparent 50%,#d4cba8 50%)"></div>
        </div>
      </div>
    </div>
    <div style="position:absolute;right:-20px;top:100px;opacity:0.22;animation:float2 4s ease-in-out infinite">
      <div style="width:85px;height:98px;background:#7a9a6a;border:3px solid #5a7a4a;border-radius:14px;display:flex;flex-direction:column;align-items:center;padding-top:8px;box-shadow:0 8px 20px rgba(0,0,0,0.15)">
        <div style="width:30px;height:11px;background:#5a7a4a;border-radius:10px;margin-top:-11px"></div>
        <div style="flex:1;width:calc(100% - 10px);margin:5px 0;background:#f5f0e0;border-radius:8px;padding:6px;position:relative;overflow:hidden">
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;border-radius:2px"></div>
          <div style="position:absolute;bottom:0;right:0;width:12px;height:12px;background:linear-gradient(135deg,transparent 50%,#d4cba8 50%)"></div>
        </div>
      </div>
    </div>
    <div style="position:absolute;left:-10px;bottom:100px;opacity:0.20;animation:float3 4.5s ease-in-out infinite">
      <div style="width:80px;height:92px;background:#6a8a5a;border:3px solid #4a6a3a;border-radius:14px;display:flex;flex-direction:column;align-items:center;padding-top:8px;box-shadow:0 8px 20px rgba(0,0,0,0.15)">
        <div style="width:28px;height:11px;background:#4a6a3a;border-radius:10px;margin-top:-11px"></div>
        <div style="flex:1;width:calc(100% - 10px);margin:5px 0;background:#f5f0e0;border-radius:8px;padding:6px;position:relative;overflow:hidden">
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;border-radius:2px"></div>
          <div style="position:absolute;bottom:0;right:0;width:12px;height:12px;background:linear-gradient(135deg,transparent 50%,#d4cba8 50%)"></div>
        </div>
      </div>
    </div>
    <div style="position:absolute;right:-15px;bottom:80px;opacity:0.20;animation:float4 3.8s ease-in-out infinite">
      <div style="width:90px;height:105px;background:#5a7a4a;border:3px solid #3a5a2a;border-radius:14px;display:flex;flex-direction:column;align-items:center;padding-top:8px;box-shadow:0 8px 20px rgba(0,0,0,0.15)">
        <div style="width:32px;height:12px;background:#3a5a2a;border-radius:10px;margin-top:-12px"></div>
        <div style="flex:1;width:calc(100% - 10px);margin:5px 0;background:#f5f0e0;border-radius:8px;padding:8px 6px;position:relative;overflow:hidden">
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;margin-bottom:7px;border-radius:2px"></div>
          <div style="height:1.5px;background:#e0d8c0;border-radius:2px"></div>
          <div style="position:absolute;bottom:0;right:0;width:14px;height:14px;background:linear-gradient(135deg,transparent 50%,#d4cba8 50%)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-3 flex items-center justify-between"
    style="background:var(--paper);border-bottom:2px solid var(--paper-line);box-shadow:var(--shadow-sm)">
    <div class="flex items-center gap-3">
      <button id="btnToggleSidebar" style="color:var(--text-muted)" class="hover:opacity-70 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="nav-clip"><span>📋</span></div>
      <span class="text-lg font-bold" style="color:var(--green-deep)">Notes App</span>
    </div>

    <div class="flex-1 max-w-md mx-6">
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text-light)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Cari catatan..."
          class="w-full rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none"
          style="background:white;border:1.5px solid var(--paper-line);color:var(--text)"/>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 rounded-xl px-3 py-1.5"
        style="background:white;border:1.5px solid var(--border)">
        <img id="userPhoto" src="" alt="foto" class="w-7 h-7 rounded-full hidden"/>
        <span id="userName" class="text-sm font-medium hidden" style="color:var(--green-deep)"></span>
      </div>
      <button id="btnLogout" class="text-sm font-medium px-3 py-1.5 rounded-xl transition"
        style="color:var(--text-muted);border:1.5px solid var(--border);background:white">
        Keluar
      </button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="flex pt-16 min-h-screen" style="position:relative;z-index:1">

    <!-- SIDEBAR -->
    <aside id="sidebar"
      class="fixed left-0 top-16 bottom-0 w-64 p-5 flex flex-col gap-2 overflow-y-auto transition-transform duration-300"
      style="background:var(--paper);border-right:2px solid var(--paper-line);box-shadow:var(--shadow-md);background-image:repeating-linear-gradient(transparent,transparent 27px,var(--paper-line) 27px,var(--paper-line) 28px)">

      <button id="btnNewNote"
        class="w-full flex items-center justify-center gap-2 font-semibold py-3 rounded-2xl transition mb-3"
        style="background:linear-gradient(135deg,var(--green-mid),var(--green-deep));color:white;border:2px solid var(--green-dark);box-shadow:var(--shadow-md)">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Catatan Baru
      </button>

      <div class="rounded-2xl p-4 mb-2"
        style="background:white;border:1.5px solid var(--paper-line);box-shadow:var(--shadow-sm)">
        <p class="text-xs font-semibold mb-1" style="color:var(--green-mid)">Selamat datang! 👋</p>
        <p id="sidebarName" class="text-sm font-bold" style="color:var(--green-deep)"></p>
      </div>

      <p class="text-xs uppercase font-bold mt-2 px-2 tracking-wider" style="color:var(--text-light)">Kategori</p>

      <button data-category="Semua"    class="category-btn active-category text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>📋</span> Semua</button>
      <button data-category="Personal" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>👤</span> Personal</button>
      <button data-category="Kerja"    class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>💼</span> Kerja</button>
      <button data-category="Ide"      class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>💡</span> Ide</button>
      <button data-category="Penting"  class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>⭐</span> Penting</button>
      <button data-category="Lainnya"  class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><span>🗂️</span> Lainnya</button>

      <div class="mt-auto pt-4" style="border-top:1.5px solid var(--paper-line)">
        <div class="rounded-2xl p-3 flex items-center justify-between"
          style="background:white;border:1.5px solid var(--paper-line)">
          <span class="text-xs font-medium" style="color:var(--text-muted)">Total Catatan</span>
          <span id="totalNotes" class="text-sm font-bold" style="color:var(--green-mid)">0</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="mainContent" class="ml-64 flex-1 p-8 transition-all duration-300">

      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 id="pageTitle" class="text-3xl font-bold" style="color:var(--green-deep)">Semua Catatan</h2>
          <p id="noteCount" class="text-sm mt-1" style="color:var(--text-light)"></p>
        </div>
      </div>

      <div id="pinnedSection" class="hidden mb-8">
        <div class="section-divider">
          <span class="text-base">📌</span>
          <p class="text-xs uppercase font-bold tracking-wider" style="color:var(--text-light)">Disematkan</p>
        </div>
        <div id="pinnedGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      </div>

      <div id="notesSection">
        <div id="otherLabelWrap" class="hidden section-divider">
          <span class="text-base">📄</span>
          <p class="text-xs uppercase font-bold tracking-wider" style="color:var(--text-light)">Lainnya</p>
        </div>
        <div id="notesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      </div>

      <div id="emptyState" class="hidden flex-col items-center justify-center py-24 gap-4">
        <div class="w-24 h-24 rounded-3xl flex items-center justify-center text-5xl"
          style="background:white;border:2px solid var(--paper-line);box-shadow:var(--shadow-sm)">📭</div>
        <p class="text-lg font-medium" style="color:var(--green-dark)">Belum ada catatan</p>
        <p class="text-sm" style="color:var(--text-light)">Mulai tulis catatan pertamamu!</p>
        <button id="btnNewNote2" class="text-white px-6 py-3 rounded-2xl font-semibold transition mt-2"
          style="background:linear-gradient(135deg,var(--green-mid),var(--green-deep));box-shadow:var(--shadow-md)">
          + Buat Catatan
        </button>
      </div>

      <div id="loadingState" class="flex items-center justify-center py-24">
        <div class="w-10 h-10 border-4 border-t-transparent rounded-full animate-spin"
          style="border-color:var(--green-pale);border-top-color:transparent"></div>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:rgba(30,50,20,0.45);backdrop-filter:blur(4px)">
    <div class="rounded-3xl w-full max-w-2xl flex flex-col gap-5 p-7 max-h-[90vh] overflow-y-auto"
      style="background:var(--paper);border:2px solid var(--paper-line);box-shadow:var(--shadow-lg);background-image:repeating-linear-gradient(transparent,transparent 31px,var(--paper-line) 31px,var(--paper-line) 32px)">

      <div class="flex items-center justify-between">
        <h3 id="modalTitle" class="text-xl font-bold" style="color:var(--green-deep)">Catatan Baru</h3>
        <button id="btnCloseModal" class="w-8 h-8 rounded-full flex items-center justify-center transition"
          style="background:white;border:1px solid var(--border);color:var(--text-muted)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <input id="noteTitle" type="text" placeholder="Judul catatan..."
        class="rounded-2xl px-5 py-3 text-sm font-medium focus:outline-none"
        style="background:white;border:1.5px solid var(--paper-line);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif"/>

      <select id="noteCategory" class="rounded-2xl px-5 py-3 text-sm focus:outline-none"
        style="background:white;border:1.5px solid var(--paper-line);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif">
        <option value="Personal">👤 Personal</option>
        <option value="Kerja">💼 Kerja</option>
        <option value="Ide">💡 Ide</option>
        <option value="Penting">⭐ Penting</option>
        <option value="Lainnya">🗂️ Lainnya</option>
      </select>

      <textarea id="noteContent" rows="7" placeholder="Tulis catatanmu di sini..."
        class="rounded-2xl px-5 py-3 text-sm focus:outline-none resize-none"
        style="background:white;border:1.5px solid var(--paper-line);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif"></textarea>

      <label class="flex items-center gap-3 cursor-pointer rounded-2xl px-4 py-3"
        style="background:white;border:1.5px solid var(--paper-line)">
        <input id="notePin" type="checkbox" class="w-4 h-4" style="accent-color:var(--green-mid)"/>
        <span class="text-sm font-medium" style="color:var(--text-muted)">📌 Sematkan catatan ini</span>
      </label>

      <div class="flex items-center justify-between pt-2" style="border-top:1.5px solid var(--paper-line)">
        <button id="btnDeleteNote" class="hidden text-sm font-medium transition" style="color:#b05a4a">
          🗑️ Hapus
        </button>
        <div class="flex gap-3 ml-auto">
          <button id="btnCancelModal" class="px-5 py-2.5 rounded-2xl text-sm font-medium transition"
            style="color:var(--text-muted);background:white;border:1px solid var(--border)">
            Batal
          </button>
          <button id="btnSaveNote" class="px-6 py-2.5 text-white rounded-2xl text-sm font-semibold transition"
            style="background:linear-gradient(135deg,var(--green-mid),var(--green-deep));box-shadow:var(--shadow-sm)">
            Simpan
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="notes.js"></script>
</body>
</html>
