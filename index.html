<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
        .clip {
      width: 200px;
      height: 70px;
      background: #4a6a3a;
      border-radius: 20px;
      position: absolute;
      top: -19px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 10;
    }
    .clip::before {
      content: '';
      width: 180px;
      height: 60px;
      background: #3a5a2a;
      border-radius: 20px;
    }
    .clip::after {
      content: '';
      width: 175px;
      height: 55px;
      background: #5a7a4a;
      border-radius: 20px;
      position: absolute;
    }
    .corner-fold {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, transparent 50%, #d4cba8 50%);
      border-top-left-radius: 4px;
    }
    .note-line {
      height: 1.5px;
      background: #e0d8c0;
      border-radius: 2px;
      margin-bottom: 12px;
    }
    .floating-note {
      position: absolute;
      pointer-events: none;
    }
    @keyframes float1 {
      0%, 100% { transform: rotate(-15deg) translateY(0px); }
      50% { transform: rotate(-15deg) translateY(-15px); }
    }
    @keyframes float2 {
      0%, 100% { transform: rotate(12deg) translateY(0px); }
      50% { transform: rotate(12deg) translateY(-20px); }
    }
    @keyframes float3 {
      0%, 100% { transform: rotate(10deg) translateY(0px); }
      50% { transform: rotate(10deg) translateY(-12px); }
    }
    @keyframes float4 {
      0%, 100% { transform: rotate(-10deg) translateY(0px); }
      50% { transform: rotate(-10deg) translateY(-18px); }
    }
    @keyframes float5 {
      0%, 100% { transform: rotate(5deg) translateY(0px); }
      50% { transform: rotate(5deg) translateY(-10px); }
    }
    @keyframes float6 {
      0%, 100% { transform: rotate(-8deg) translateY(0px); }
      50% { transform: rotate(-8deg) translateY(-14px); }
    }
    @keyframes float7 {
      0%, 100% { transform: rotate(20deg) translateY(0px); }
      50% { transform: rotate(20deg) translateY(-16px); }
    }
    @keyframes float8 {
      0%, 100% { transform: rotate(-20deg) translateY(0px); }
      50% { transform: rotate(-20deg) translateY(-10px); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden"

  <!-- LOGIN CARD — Berbentuk Notes/Clipboard -->
  <div class="relative z-10" style="margin-top:20px">

    <!-- Clipboard outer frame -->
    <div class="relative" style="width:420px;">

      <!-- Klip atas -->
      <div class="clip"></div>

      <!-- Papan clipboard (hijau) -->
      <div style="background:#5a7a4a;border:4px solid #4a6a3a;border-radius:20px;padding:16px;padding-top:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3)">

        <!-- Kertas (krem) -->
        <div style="background:#f5f0e0;border-radius:12px;padding:32px 28px 40px;position:relative;min-height:480px;overflow:hidden">

          <!-- Garis dekorasi kertas -->
          <div style="position:absolute;left:0;right:0;top:0;height:4px;background:linear-gradient(90deg,#e8e0c8,#f0e8d0,#e8e0c8);border-radius:12px 12px 0 0"></div>

          <!-- Sudut melipat -->
          <div class="corner-fold"></div>

          <!-- Konten Login -->

            </button>
