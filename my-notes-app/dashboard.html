<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body style="background:#f0f9ff; font-family:'Plus Jakarta Sans',sans-serif;" class="min-h-screen">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-100 px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <button id="btnToggleSidebar" class="text-slate-400 hover:text-sky-500 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
          <span class="text-white text-sm font-bold">N</span>
        </div>
        <span class="text-lg font-bold text-slate-800">Notes App</span>
      </div>
    </div>

    <!-- Search -->
    <div class="flex-1 max-w-md mx-6">
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Cari catatan..."
          class="w-full bg-slate-50 border border-slate-200 text-slate-700 placeholder-slate-400 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 focus:border-sky-300"/>
      </div>
    </div>

    <!-- User -->
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 bg-slate-50 rounded-xl px-3 py-1.5 border border-slate-200">
        <img id="userPhoto" src="" alt="foto" class="w-7 h-7 rounded-full hidden"/>
        <span id="userName" class="text-sm font-medium text-slate-700 hidden"></span>
      </div>
      <button id="btnLogout"
        class="text-sm font-medium text-slate-500 hover:text-red-500 border border-slate-200 hover:border-red-200 px-3 py-1.5 rounded-xl transition">
        Keluar
      </button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="flex pt-16 min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar"
      class="fixed left-0 top-16 bottom-0 w-64 bg-white border-r border-slate-100 p-5 flex flex-col gap-2 overflow-y-auto transition-transform duration-300 shadow-sm">

      <!-- New Note Button -->
      <button id="btnNewNote"
        class="w-full flex items-center justify-center gap-2 text-white font-semibold py-3 rounded-2xl transition mb-3 shadow-md hover:shadow-lg hover:opacity-90"
        style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Catatan Baru
      </button>

      <!-- Welcome Card -->
      <div class="rounded-2xl p-4 mb-2" style="background:linear-gradient(135deg,#e0f2fe,#ede9fe)">
        <p class="text-xs font-semibold text-sky-600 mb-1">Selamat datang! 👋</p>
        <p id="sidebarName" class="text-sm font-bold text-slate-700"></p>
      </div>

      <!-- Kategori -->
      <p class="text-xs text-slate-400 uppercase font-bold mt-2 px-2 tracking-wider">Kategori</p>

      <button data-category="Semua" class="category-btn active-category text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>📋</span> Semua
      </button>
      <button data-category="Personal" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>👤</span> Personal
      </button>
      <button data-category="Kerja" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>💼</span> Kerja
      </button>
      <button data-category="Ide" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>💡</span> Ide
      </button>
      <button data-category="Penting" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>⭐</span> Penting
      </button>
      <button data-category="Lainnya" class="category-btn text-left px-4 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-sky-50 transition flex items-center gap-2">
        <span>🗂️</span> Lainnya
      </button>

      <!-- Stats -->
      <div class="mt-auto pt-4 border-t border-slate-100">
        <div class="rounded-2xl p-3 flex items-center justify-between" style="background:linear-gradient(135deg,#f0f9ff,#ede9fe)">
          <span class="text-xs text-slate-500 font-medium">Total Catatan</span>
          <span id="totalNotes" class="text-sm font-bold text-sky-500">0</span>
        </div>
      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main id="mainContent" class="ml-64 flex-1 p-8 transition-all duration-300">

      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 id="pageTitle" class="text-3xl font-bold text-slate-800">Semua Catatan</h2>
          <p id="noteCount" class="text-sm text-slate-400 mt-1"></p>
        </div>
      </div>

      <!-- Pinned Notes -->
      <div id="pinnedSection" class="hidden mb-8">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg">📌</span>
          <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Disematkan</p>
        </div>
        <div id="pinnedGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      </div>

      <!-- All Notes -->
      <div id="notesSection">
        <div id="otherLabelWrap" class="hidden flex items-center gap-2 mb-4">
          <span class="text-lg">📄</span>
          <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Lainnya</p>
        </div>
        <div id="notesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden flex-col items-center justify-center py-24 gap-4">
        <div class="w-24 h-24 rounded-3xl flex items-center justify-center text-5xl" style="background:linear-gradient(135deg,#e0f2fe,#ede9fe)">📭</div>
        <p class="text-slate-500 text-lg font-medium">Belum ada catatan</p>
        <p class="text-slate-400 text-sm">Mulai tulis catatan pertamamu!</p>
        <button id="btnNewNote2"
          class="text-white px-6 py-3 rounded-2xl font-semibold shadow-md hover:shadow-lg transition mt-2 hover:opacity-90"
          style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
          + Buat Catatan
        </button>
      </div>

      <!-- Loading -->
      <div id="loadingState" class="flex items-center justify-center py-24">
        <div class="w-10 h-10 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(15,23,42,0.5);backdrop-filter:blur(4px)">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col gap-5 p-7 max-h-[90vh] overflow-y-auto">

      <!-- Modal Header -->
      <div class="flex items-center justify-between">
        <h3 id="modalTitle" class="text-xl font-bold text-slate-800">Catatan Baru</h3>
        <button id="btnCloseModal" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Title -->
      <input id="noteTitle" type="text" placeholder="Judul catatan..."
        class="bg-slate-50 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-2xl px-5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-sky-300"/>

      <!-- Category -->
      <select id="noteCategory"
        class="bg-slate-50 border border-slate-200 text-slate-700 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300">
        <option value="Personal">👤 Personal</option>
        <option value="Kerja">💼 Kerja</option>
        <option value="Ide">💡 Ide</option>
        <option value="Penting">⭐ Penting</option>
        <option value="Lainnya">🗂️ Lainnya</option>
      </select>

      <!-- Content -->
      <textarea id="noteContent" rows="7" placeholder="Tulis catatanmu di sini..."
        class="bg-slate-50 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 resize-none"></textarea>

      <!-- Pin -->
      <label class="flex items-center gap-3 cursor-pointer bg-slate-50 rounded-2xl px-4 py-3 border border-slate-200">
        <input id="notePin" type="checkbox" class="w-4 h-4 accent-sky-500"/>
        <span class="text-sm font-medium text-slate-600">📌 Sematkan catatan ini</span>
      </label>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-2 border-t border-slate-100">
        <button id="btnDeleteNote" class="hidden text-red-400 hover:text-red-500 text-sm font-medium transition">
          🗑️ Hapus
        </button>
        <div class="flex gap-3 ml-auto">
          <button id="btnCancelModal" class="px-5 py-2.5 rounded-2xl text-sm font-medium text-slate-500 hover:bg-slate-100 transition">
            Batal
          </button>
          <button id="btnSaveNote"
            class="px-6 py-2.5 text-white rounded-2xl text-sm font-semibold shadow-md hover:shadow-lg transition hover:opacity-90"
            style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
            Simpan
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="notes.js"></script>
</body>
</html>
