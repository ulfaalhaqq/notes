<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg,#e0f2fe,#ede9fe); font-family:'Plus Jakarta Sans',sans-serif;">

  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md flex flex-col items-center gap-6">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-3">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-slate-800">Notes App</h1>
      <p class="text-slate-400 text-sm text-center">Simpan ide dan catatanmu dengan mudah</p>
    </div>

    <!-- Divider -->
    <div class="w-full border-t border-slate-100"></div>

    <!-- Stats -->
    <div class="w-full grid grid-cols-3 gap-3">
      <div class="bg-sky-50 rounded-2xl p-3 text-center">
        <p class="text-2xl font-bold text-sky-500">✍️</p>
        <p class="text-xs text-slate-500 mt-1">Tulis</p>
      </div>
      <div class="bg-indigo-50 rounded-2xl p-3 text-center">
        <p class="text-2xl font-bold text-indigo-500">📌</p>
        <p class="text-xs text-slate-500 mt-1">Sematkan</p>
      </div>
      <div class="bg-purple-50 rounded-2xl p-3 text-center">
        <p class="text-2xl font-bold text-purple-500">📂</p>
        <p class="text-xs text-slate-500 mt-1">Kategori</p>
      </div>
    </div>

    <!-- Login Button -->
    <button id="btnGoogle"
      class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-3.5 px-6 rounded-2xl transition duration-200 shadow-md hover:shadow-lg border border-slate-200">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"/>
      Masuk dengan Google
    </button>

    <!-- Error -->
    <p id="errorMsg" class="text-red-400 text-sm hidden text-center"></p>

    <!-- Footer -->
    <p class="text-slate-400 text-xs text-center">
      Dengan masuk, kamu menyetujui syarat & ketentuan kami
    </p>

  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
